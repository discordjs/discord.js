packages:
  - apps/*
  - packages/*

autoInstallPeers: false

ignoredBuiltDependencies:
  - core-js-pure
  - unrs-resolver

onlyBuiltDependencies:
  - '@tailwindcss/oxide'
  - bufferutil
  - esbuild
  - protobufjs
  - rclone.js
  - sharp
  - utf-8-validate
  - workerd
  - zlib-sync

peerDependencyRules:
  allowAny:
    - '*'
  ignoreMissing:
    - '*'

publicHoistPattern:
  - '*eslint*'
  - '*prettier*'
  - '*@rushstack/node-core-library*'
  - '*jju*'

updateConfig:
  ignoreDependencies:
    - jsdoc-to-markdown
    - typedoc
