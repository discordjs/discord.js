name: Publish dev
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'The tag to use, generally a feature name'
        required: false
        type: string
      dry_run:
        description: 'Perform a dry run'
        type: boolean
        default: false
jobs:
  npm-publish:
    name: npm publish (dev)
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    if: github.repository_owner == 'Dijnie'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Node.js v24
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Set dev version
        run: |
          TAG="${{ inputs.tag || 'dev' }}"
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          pnpm -r --filter "./packages/*" exec pnpm version --no-git-tag-version --preid "${TAG}.${TIMESTAMP}" prepatch

      - name: Publish (dry run)
        if: ${{ inputs.dry_run }}
        run: pnpm -r --filter "./packages/*" exec pnpm publish --dry-run --no-git-checks --access public --tag "${{ inputs.tag || 'dev' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: pnpm -r --filter "./packages/*" exec pnpm publish --no-git-checks --access public --tag "${{ inputs.tag || 'dev' }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
